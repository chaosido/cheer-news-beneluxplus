# Firebase App Hosting config for the Next.js app.
# Public NEXT_PUBLIC_* vars are safe to inline (they ship to the browser anyway).
# Server-only secrets are pulled from Secret Manager (created during deploy).
# The App Hosting compute service account is granted roles/datastore.user, so
# firebase-admin uses Application Default Credentials — no key file in prod.

runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDXnwCkwBUlVRQOxdva40iayKrHXX79vYM
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: cheer-overview-site.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: cheer-overview-site
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: cheer-overview-site.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "857819330314"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:857819330314:web:e0f398947fe6723094acf3"
    availability:
      - BUILD
      - RUNTIME
  - variable: GCP_PROJECT_ID
    value: cheer-overview-site
    availability:
      - RUNTIME
  # Disabled — Gemini not in use. Re-add to enable LLM extraction.
  # - variable: GEMINI_MODEL
  #   value: gemini-2.5-flash
  #   availability:
  #     - RUNTIME
  - variable: ADMIN_EMAILS
    value: jesse@cheersport.nl,arjen@cheersport.nl,wonnink.jesse@gmail.com
    availability:
      - RUNTIME
  # Content-Security-Policy rollout switch (read by proxy.ts):
  #   report-only → browser logs violations, blocks nothing (start here)
  #   enforce     → policy is enforced (flip after the report-only soak is clean)
  #   off         → no CSP header
  - variable: CSP_MODE
    value: report-only
    availability:
      - RUNTIME
  # Server-only secrets (create with: firebase apphosting:secrets:set <name>).
  # IP pseudonymization salt — REQUIRED in production (the submit endpoint
  # throws without it). Create with a random 32-byte value:
  #   openssl rand -hex 32 | firebase apphosting:secrets:set ip-hash-salt --data-file=-
  - variable: IP_HASH_SALT
    secret: ip-hash-salt
    availability:
      - RUNTIME
  # Turnstile is optional — the submission form degrades gracefully without it.
  # Add TURNSTILE_SECRET_KEY / NEXT_PUBLIC_TURNSTILE_SITE_KEY here once configured.
  # Disabled — Gemini not in use. Re-add to enable LLM extraction.
  # (Also re-grant the secret: firebase apphosting:secrets:grantaccess gemini-api-key)
  # - variable: GEMINI_API_KEY
  #   secret: gemini-api-key
  #   availability:
  #     - RUNTIME
  # Email notifications (Gmail SMTP) are OFF until configured — the mailer no-ops
  # gracefully without them. To enable, create the secret and re-add these:
  #   firebase apphosting:secrets:set gmail-app-password
  # - variable: GMAIL_USER
  #     value: wonnink.jesse@gmail.com   (availability: RUNTIME)
  # - variable: GMAIL_APP_PASSWORD
  #     secret: gmail-app-password       (availability: RUNTIME)
