name: Daily aggregation

on:
  # Aggregator is PAUSED while Gemini/LLM extraction is disabled. The scheduled
  # cron is commented out so it does not run on a timer; workflow_dispatch is
  # kept so it can still be triggered manually (JSON-LD-only) if needed.
  # To resume the daily run, uncomment the schedule block below.
  # schedule:
  #   # 04:17 UTC daily (off-peak; cron rarely fires exactly on the hour).
  #   - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (count only, no writes)"
        type: boolean
        default: false

concurrency:
  group: aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Run aggregator
        run: npx tsx scripts/aggregate.ts ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: cheer-news-beneluxplus
          # Disabled — Gemini not in use. Re-add to enable LLM extraction
          # (and set GEMINI_ENABLED=true so the extractor uses the key).
          # GEMINI_ENABLED: "true"
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GEMINI_MODEL: gemini-2.5-flash
          MAX_LLM_CALLS_PER_RUN: "40"
