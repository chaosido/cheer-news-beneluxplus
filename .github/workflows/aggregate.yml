name: Daily aggregation

on:
  # Aggregator is PAUSED while Gemini/LLM extraction is disabled. The scheduled
  # cron is commented out so it does not run on a timer; workflow_dispatch is
  # kept so it can still be triggered manually (JSON-LD-only) if needed.
  # To resume the daily run, uncomment the schedule block below.
  # schedule:
  #   # 04:17 UTC daily (off-peak; cron rarely fires exactly on the hour).
  #   - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (count only, no writes)"
        type: boolean
        default: false

concurrency:
  group: aggregate
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Run aggregator
        run: npx tsx scripts/aggregate.ts ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }}
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: cheer-overview-site
          # Disabled — Gemini not in use. Re-add to enable LLM extraction
          # (and set GEMINI_ENABLED=true so the extractor uses the key).
          # GEMINI_ENABLED: "true"
          # GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GEMINI_MODEL: gemini-2.5-flash
          MAX_LLM_CALLS_PER_RUN: "40"
