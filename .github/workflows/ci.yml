name: CI

# Quality gate for every PR and pushes to the long-lived branches.
# Hard gates (fail the run): lint, typecheck, test, dependency audit (high+),
# secret scan (gitleaks).
# Informational (continue-on-error): format drift, next build — signal without
# blocking merges while the repo is being cleaned up.
on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      # --- Hard gates -------------------------------------------------------
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # --- Informational (do not block) ------------------------------------
      - name: Format check
        run: npm run format:check
        continue-on-error: true

      - name: Build
        run: npm run build
        continue-on-error: true
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      # --- Hard gate: dependency audit --------------------------------------
      # Fails the run on high/critical advisories. Moderate and below stay
      # informational. If a fix isn't yet available upstream, triage with
      # `npm audit` locally and add a scoped allowance rather than reverting
      # this gate.
      - name: Dependency audit
        run: npm audit --audit-level=high

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so gitleaks scans every commit, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
